apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik
  namespace: flux-system
spec:
  # Reverse proxy. Dipende da infrastructure (che garantisce che cert-manager
  # sia installato e i ClusterIssuer configurati, prerequisiti per i TLSStore
  # e i certificati Let's Encrypt).
  dependsOn:
    - name: infrastructure
  interval: 1h
  retryInterval: 5m
  timeout: 10m
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./k8s/infra/traefik
