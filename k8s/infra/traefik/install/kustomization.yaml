apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Install layer: HelmRepository + HelmRelease per Traefik.
# Questo Kustomization applica solo il chart (e quindi le CRD traefik.io).
# Le risorse che dipendono dalle CRD (TLSStore, IngressRoute) vanno in config/.
resources:
  - helmrelease.yaml
